name: E2E Smoke

on:
  workflow_dispatch:
  pull_request:
    branches: ["main", "master", "codex/**"]
  push:
    branches: ["codex/**"]

concurrency:
  group: e2e-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_AUTH_STORAGE_STATE_B64: ${{ secrets.E2E_AUTH_STORAGE_STATE_B64 }}
      E2E_ADMIN_AUTH_STORAGE_STATE_B64: ${{ secrets.E2E_ADMIN_AUTH_STORAGE_STATE_B64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install Dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run Core Smoke Suite
        run: npm run test:e2e:smoke:core
      - name: Prepare Optional Auth State
        if: github.event_name == 'workflow_dispatch'
        run: npm run test:e2e:auth:prepare
      - name: Run Authenticated Smoke Extension
        if: github.event_name == 'workflow_dispatch'
        run: npm run test:e2e:smoke:auth
      - name: Upload Playwright HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: warn
          retention-days: 14
      - name: Upload Playwright Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: warn
          retention-days: 14
