name: E2E Smoke

on:
  workflow_dispatch:
  pull_request:
    branches: ["main", "master", "codex/**"]
  push:
    branches: ["codex/**"]

concurrency:
  group: e2e-smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      E2E_AUTH_STORAGE_STATE_B64: ${{ secrets.E2E_AUTH_STORAGE_STATE_B64 }}
      E2E_ADMIN_AUTH_STORAGE_STATE_B64: ${{ secrets.E2E_ADMIN_AUTH_STORAGE_STATE_B64 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:auth:prepare
      - run: npm run test:e2e:smoke
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14
