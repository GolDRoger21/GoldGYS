name: Release Readiness

on:
  workflow_dispatch:
    inputs:
      full_checks:
        description: "Run rules + core e2e checks"
        required: true
        default: false
        type: boolean
      min_global_headroom_kb:
        description: "Minimum global headroom (kB) threshold"
        required: true
        default: "1"
        type: string
      min_risk_headroom_kb:
        description: "Minimum top-risk headroom (kB) threshold"
        required: true
        default: "0.75"
        type: string
      enforce_decision:
        description: "Fail workflow when decision is NO-GO"
        required: true
        default: true
        type: boolean
      cwv_snapshot_b64:
        description: "Optional base64 JSON for scripts/cwv-snapshot.json"
        required: false
        type: string

concurrency:
  group: release-readiness-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  checklist:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Apply Optional CWV Snapshot
        if: inputs.cwv_snapshot_b64 != ''
        shell: bash
        run: |
          mkdir -p scripts
          echo '${{ inputs.cwv_snapshot_b64 }}' | base64 --decode > scripts/cwv-snapshot.json

      - name: Setup Java 21
        if: inputs.full_checks == true
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install Playwright Chromium
        if: inputs.full_checks == true
        run: npx playwright install --with-deps chromium

      - name: Generate Release Checklist (Standard)
        id: checklist_standard
        if: inputs.full_checks != true
        run: npm run release:checklist:refresh

      - name: Generate Release Checklist (Full)
        id: checklist_full
        if: inputs.full_checks == true
        run: npm run release:checklist:refresh:full

      - name: Resolve Checklist Path
        id: checklist_path
        shell: bash
        run: |
          stamp="$(date +%F)"
          file="docs/releases/release-checklist-${stamp}.md"
          status_file="docs/releases/release-status-${stamp}.json"
          if [ ! -f "$file" ]; then
            echo "Checklist not found: $file"
            exit 1
          fi
          echo "file=$file" >> "$GITHUB_OUTPUT"
          echo "status_file=$status_file" >> "$GITHUB_OUTPUT"

      - name: Resolve Decision
        id: release_decision
        shell: bash
        run: |
          node -e "const fs=require('fs'); const p='${{ steps.checklist_path.outputs.file }}'; const t=fs.readFileSync(p,'utf8'); const m=t.match(/- Karar:\s*`([^`]+)`/); process.stdout.write(`decision=${(m&&m[1]?m[1]:'UNKNOWN').trim().toUpperCase()}`)" >> "$GITHUB_OUTPUT"

      - name: Resolve Status Summary
        id: release_status
        shell: bash
        run: |
          node - <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require("fs");
          const path = "${{ steps.checklist_path.outputs.status_file }}";
          if (!fs.existsSync(path)) {
            console.log("budget_total=unknown");
            console.log("budget_js=unknown");
            console.log("budget_css=unknown");
            console.log("budget_html=unknown");
            console.log("risk_1=unknown");
            console.log("risk_2=unknown");
            console.log("risk_3=unknown");
            process.exit(0);
          }
          const data = JSON.parse(fs.readFileSync(path, "utf8"));
          const b = data.budget || {};
          const fmt = (m) => (m && Number.isFinite(m.usedKb) && Number.isFinite(m.limitKb))
            ? `${m.usedKb.toFixed(2)}/${m.limitKb.toFixed(2)} kB (headroom ${m.headroomKb.toFixed(2)} kB)`
            : "unknown";
          const risks = Array.isArray(b.riskTop3) ? b.riskTop3 : [];
          console.log(`budget_total=${fmt(b.globalTotal)}`);
          console.log(`budget_js=${fmt(b.globalJs)}`);
          console.log(`budget_css=${fmt(b.globalCss)}`);
          console.log(`budget_html=${fmt(b.globalHtml)}`);
          console.log(`risk_1=${risks[0] || "unknown"}`);
          console.log(`risk_2=${risks[1] || "unknown"}`);
          console.log(`risk_3=${risks[2] || "unknown"}`);
          NODE

      - name: Resolve Headroom Thresholds
        id: resolved_headroom
        shell: bash
        run: |
          node - <<'NODE' > /tmp/headroom.json
          const { spawnSync } = require("child_process");
          const result = spawnSync("node", [
            "scripts/resolve-headroom-thresholds.cjs",
            `--global=${process.env.IN_GLOBAL}`,
            `--risk=${process.env.IN_RISK}`
          ], { encoding: "utf8", shell: false });
          if (result.status !== 0 || result.error) {
            console.error(result.stderr || result.error?.message || "resolve failed");
            process.exit(1);
          }
          process.stdout.write(result.stdout);
          NODE
          echo "global=$(node -e \"const j=require('/tmp/headroom.json'); process.stdout.write(String(j.resolved.global));\")" >> "$GITHUB_OUTPUT"
          echo "risk=$(node -e \"const j=require('/tmp/headroom.json'); process.stdout.write(String(j.resolved.risk));\")" >> "$GITHUB_OUTPUT"
        env:
          IN_GLOBAL: ${{ inputs.min_global_headroom_kb }}
          IN_RISK: ${{ inputs.min_risk_headroom_kb }}

      - name: Upload Checklist Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-checklist
          path: ${{ steps.checklist_path.outputs.file }}
          if-no-files-found: error
          retention-days: 14

      - name: Upload Release Status Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-status
          path: ${{ steps.checklist_path.outputs.status_file }}
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Release History Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-history
          path: docs/releases/release-history.json
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Release Dashboard Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-dashboard
          path: docs/releases/release-dashboard.md
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Headroom Suggestion Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-headroom-suggestion
          path: docs/releases/release-headroom-suggestion.json
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce GO Decision
        if: inputs.enforce_decision == true
        shell: bash
        run: |
          if [ "${{ steps.release_decision.outputs.decision }}" != "GO" ]; then
            echo "Release decision is NO-GO."
            exit 1
          fi

      - name: Enforce Budget Headroom
        shell: bash
        run: |
          node scripts/check-release-headroom.cjs --min-kb=${{ steps.resolved_headroom.outputs.global }} --min-risk-kb=${{ steps.resolved_headroom.outputs.risk }}

      - name: Publish Release Readiness Summary
        if: always()
        run: |
          {
            echo "## Release Readiness Summary"
            echo ""
            echo "- Full checks: \`${{ inputs.full_checks }}\`"
            echo "- Enforce decision: \`${{ inputs.enforce_decision }}\`"
            echo "- Min global headroom gate: \`${{ inputs.min_global_headroom_kb }} kB\`"
            echo "- Min top-risk headroom gate: \`${{ inputs.min_risk_headroom_kb }} kB\`"
            echo "- Resolved global gate: \`${{ steps.resolved_headroom.outputs.global }} kB\`"
            echo "- Resolved risk gate: \`${{ steps.resolved_headroom.outputs.risk }} kB\`"
            if [ "${{ inputs.cwv_snapshot_b64 }}" != "" ]; then
              echo "- CWV snapshot: provided (workflow input)"
            else
              echo "- CWV snapshot: not provided (PENDING values expected)"
            fi
            echo "- Standard checklist step: ${{ steps.checklist_standard.outcome }}"
            echo "- Full checklist step: ${{ steps.checklist_full.outcome }}"
            echo "- Checklist artifact: \`${{ steps.checklist_path.outputs.file }}\`"
            echo "- Status artifact: \`${{ steps.checklist_path.outputs.status_file }}\`"
            echo "- History artifact: \`docs/releases/release-history.json\`"
            echo "- Dashboard artifact: \`docs/releases/release-dashboard.md\`"
            echo "- Headroom suggestion artifact: \`docs/releases/release-headroom-suggestion.json\`"
            echo "- Decision: \`${{ steps.release_decision.outputs.decision }}\`"
            echo "- Budget total: ${{ steps.release_status.outputs.budget_total }}"
            echo "- Budget JS: ${{ steps.release_status.outputs.budget_js }}"
            echo "- Budget CSS: ${{ steps.release_status.outputs.budget_css }}"
            echo "- Budget HTML: ${{ steps.release_status.outputs.budget_html }}"
            echo "- Risk #1: ${{ steps.release_status.outputs.risk_1 }}"
            echo "- Risk #2: ${{ steps.release_status.outputs.risk_2 }}"
            echo "- Risk #3: ${{ steps.release_status.outputs.risk_3 }}"
            echo ""
            echo "Final job result: **${{ job.status }}**"
          } >> "$GITHUB_STEP_SUMMARY"
