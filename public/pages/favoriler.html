<!DOCTYPE html>
<html lang="tr">

<head>
<script id="early-theme-init">
(function(){
  try {
    var t = localStorage.getItem('theme');
    if (t !== 'light' && t !== 'dark') t = 'dark';
    document.documentElement.setAttribute('data-theme', t);
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Favoriler | GOLD GYS</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../css/app.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <style>
    body {
      visibility: hidden;
    }

    .favorites-hero {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 24px;
    }

    .favorites-hero h2 {
      margin: 0 0 6px;
    }

    .favorites-hero p {
      margin: 0;
      color: var(--text-muted);
    }

    .favorites-hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .favorites-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .favorite-stat-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 18px;
      box-shadow: var(--shadow-sm);
    }

    .favorite-stat-card strong {
      font-size: 1.6rem;
      display: block;
      margin-top: 4px;
      color: var(--text-primary);
    }

    .favorite-stat-card small {
      color: var(--text-muted);
    }

    .favorites-filters {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .filter-group label {
      display: block;
      font-size: 0.85rem;
      margin-bottom: 6px;
      color: var(--text-muted);
    }

    .filter-group input,
    .filter-group select {
      width: 100%;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-color);
      background: var(--bg-input);
      color: var(--text-primary);
    }

    .filter-actions {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .category-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: var(--shadow-sm);
    }

    .category-card h4 {
      margin: 0;
      font-size: 1rem;
    }

    .category-meta {
      display: flex;
      justify-content: space-between;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .category-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .fav-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 18px;
      margin-bottom: 16px;
      position: relative;
      box-shadow: var(--shadow-sm);
    }

    .fav-icon {
      position: absolute;
      top: 16px;
      right: 16px;
      color: var(--color-primary);
      font-size: 1.2rem;
      cursor: pointer;
    }

    .fav-content {
      padding-right: 36px;
    }

    .fav-actions {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border-color);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .fav-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .fav-details {
      border-top: 1px dashed var(--border-color);
      margin-top: 12px;
      padding-top: 12px;
      display: none;
      color: var(--text-muted);
      font-size: 0.9rem;
      background: var(--bg-hover);
      border-radius: var(--radius-md);
      padding: 16px;
      box-shadow: inset 0 0 0 1px var(--border-color);
    }

    .fav-details.is-open {
      display: block;
    }

    .fav-detail-block {
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 12px;
    }

    .fav-detail-title {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .fav-detail-content p {
      margin: 0 0 8px;
      color: var(--text-primary);
    }

    .fav-detail-content p:last-child {
      margin-bottom: 0;
    }

    .fav-options {
      display: grid;
      gap: 10px;
      margin-top: 8px;
    }

    .fav-option-item {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 10px;
      align-items: start;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      background: var(--bg-body);
      border: 1px solid var(--border-color);
    }

    .fav-option-item span {
      font-weight: 600;
      color: var(--text-primary);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      background: rgba(59, 130, 246, 0.15);
      color: var(--color-primary);
      font-size: 0.85rem;
    }

    .empty-state {
      text-align: center;
      padding: 32px;
      border-radius: var(--radius-md);
      border: 1px dashed var(--border-color);
      color: var(--text-muted);
    }

    @media (max-width: 992px) {
      .favorites-stats {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .favorite-stat-card {
        padding: 14px;
      }

      .favorite-stat-card strong {
        font-size: 1.35rem;
      }

      .favorites-filters {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 768px) {
      .favorites-hero {
        padding: 16px;
        gap: 12px;
      }

      .favorites-hero p {
        font-size: 0.9rem;
        line-height: 1.4;
      }

      .favorites-hero-actions {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .favorites-hero-actions .btn {
        width: 100%;
        min-width: 0;
        font-size: 0.82rem;
        padding: 10px 8px;
        line-height: 1.2;
      }

      .favorites-stats {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .favorite-stat-card {
        padding: 12px 10px;
      }

      .favorite-stat-card .text-muted,
      .favorite-stat-card small {
        display: block;
        font-size: 0.72rem;
        line-height: 1.3;
      }

      .favorite-stat-card strong {
        font-size: 1.15rem;
        margin-top: 2px;
      }

      .favorites-filters {
        grid-template-columns: 1fr;
        padding: 14px;
        gap: 10px;
      }

      .filter-group label {
        font-size: 0.8rem;
      }

      .filter-actions {
        align-items: stretch;
      }

      .filter-actions .btn,
      .category-actions .btn,
      .fav-actions .btn {
        width: 100%;
      }

      .category-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .category-card,
      .fav-card {
        padding: 14px;
      }

      .fav-content {
        padding-right: 28px;
      }
    }

    @media (max-width: 420px) {
      .favorites-hero-actions .btn {
        font-size: 0.78rem;
      }

      .favorite-stat-card {
        padding: 10px 8px;
      }

      .favorite-stat-card .text-muted,
      .favorite-stat-card small {
        font-size: 0.68rem;
      }

      .favorite-stat-card strong {
        font-size: 1.05rem;
      }
    }
  </style>
  <link rel="icon" type="image/png" href="/icons/favicon.png">
  <link rel="manifest" href="/manifest.json">
  <script src="/js/theme-init.js"></script>
</head>

<body>
  <script type="module">
    import { initFavorilerPage } from "../js/favoriler-page.js";
    document.addEventListener("DOMContentLoaded", () => {
      void initFavorilerPage();
    });
  </script>

  <div class="dashboard-container">
    <section class="favorites-hero">
      <div>
        <h2>⭐ Favorilerim</h2>
        <p>Favoriye eklediğiniz soruları karma veya konu bazlı çözerek tekrar edin.</p>
      </div>
      <div class="favorites-hero-actions">
        <button class="btn btn-primary" id="btnSolveAllExam">🎯 Karma Test (Sınav)</button>
        <button class="btn btn-outline-primary" id="btnSolveAllPractice">📖 Karma Öğrenme</button>
      </div>
    </section>

    <section class="favorites-stats">
      <div class="favorite-stat-card">
        <span class="text-muted">Toplam Favori</span>
        <strong id="totalFavorites">0</strong>
      </div>
      <div class="favorite-stat-card">
        <span class="text-muted">Konu Sayısı</span>
        <strong id="totalCategories">0</strong>
        <small>Favorilerinizdeki farklı konu başlığı.</small>
      </div>
      <div class="favorite-stat-card">
        <span class="text-muted">Filtrelenen Soru</span>
        <strong id="filteredCount">0</strong>
        <small>Aktif filtrelerinize göre listelenen soru.</small>
      </div>
    </section>

    <section class="favorites-filters">
      <div class="filter-group">
        <label for="categorySelect">Konu Filtrele</label>
        <select id="categorySelect">
          <option value="all">Tüm Konular</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="searchInput">Soru Ara</label>
        <input id="searchInput" type="text" placeholder="Soru metninde ara...">
      </div>
      <div class="filter-actions">
        <button class="btn btn-outline-secondary" id="btnClearFilters">Filtreleri Temizle</button>
      </div>
    </section>

    <section>
      <h3 class="mb-3">Konu Bazlı Favoriler</h3>
      <div id="favoritesCategoryGrid" class="category-grid">
        <div class="card p-4 text-center">Yükleniyor...</div>
      </div>
    </section>

    <section>
      <h3 class="mb-3">Favori Sorular</h3>
      <div id="favoritesList">
        <div class="card p-4 text-center">Yükleniyor...</div>
      </div>
    </section>
  </div>

  </body>

</html>
