<!DOCTYPE html>
<html lang="tr">
<head>
<script id="early-theme-init">
(function(){
  try {
    var t = localStorage.getItem('theme');
    if (t !== 'light' && t !== 'dark') t = 'dark';
    document.documentElement.setAttribute('data-theme', t);
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konu Hakimiyet Merkezi | GOLD GYS</title>
    <link rel="stylesheet" href="../styles/tokens.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/app.css">
    <link rel="stylesheet" href="../css/analysis.css">
    <link rel="icon" type="image/png" href="/icons/favicon.png">
    <script src="/js/theme-init.js"></script>
</head>
<body>
    <div class="dashboard-container topic-mastery-page">
        <section class="analysis-header glass-card">
            <div>
                <h1 class="dashboard-page-title">
                    <span class="dashboard-page-title-icon" aria-hidden="true">&#128218;</span>
                    <span>Konu Hakimiyet Merkezi</span>
                </h1>
                <p class="dashboard-page-subtitle">Konu bazlı başarı durumunu takip et, odak konunu belirle ve çalışma ritmini düzenli ilerlet.</p>
            </div>
            <div class="header-actions">
                <div class="status-badge badge-blue" id="masteryLastUpdate"><span class="badge-dot pulse"></span>Güncelleniyor...</div>
                <button class="analysis-reset-btn" id="resetAllMasteryStatsBtn" type="button" title="Tüm analiz ve konu verilerini sıfırla">
                    <svg class="analysis-reset-btn-icon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                    </svg>
                    Tümünü Sıfırla
                </button>
            </div>
        </section>

        <div class="mastery-summary-grid">
            <div class="summary-pill stat-card">
                <div class="stat-icon stat-icon-success">
                    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <div class="stat-info">
                    <div class="label">Tamamlanan</div>
                    <div class="value" id="masteryCompleted">0</div>
                </div>
            </div>
            <div class="summary-pill stat-card">
                 <div class="stat-icon stat-icon-primary">
                    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                 </div>
                 <div class="stat-info">
                    <div class="label">Çalışılıyor</div>
                    <div class="value" id="masteryInProgress">0</div>
                 </div>
            </div>
            <div class="summary-pill stat-card">
                 <div class="stat-icon stat-icon-muted">
                    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg>
                 </div>
                 <div class="stat-info">
                    <div class="label">Başlanmadı</div>
                    <div class="value" id="masteryPending">0</div>
                 </div>
            </div>
        </div>

        <section class="glass-card mastery-filter-panel">
            <div class="mastery-filter-panel-accent"></div>
            <div class="card-body mastery-filter-panel-body">
                <div class="topic-controls mastery-filter-controls">
                    <div class="topic-controls-label mastery-filter-label">
                        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
                        Filtre & Sıralama
                    </div>
                    <input type="search" id="topicMasterySearchInput" class="mastery-filter-search" placeholder="Konu ara...">
                    <select id="topicMasterySortSelect" class="mastery-filter-sort">
                        <option value="smart">Akıllı (Varsayılan)</option>
                        <option value="weakest">En Zayıf Başarı</option>
                        <option value="strongest">En Yüksek Başarı</option>
                        <option value="alphabetical">A-Z</option>
                    </select>
                    <div class="chip-group mastery-filter-chips" id="topicMasteryFilterChips">
                        <button class="status-badge badge-blue status-in-progress" data-filter="in_progress">Çalışma</button>
                        <button class="status-badge badge-gray status-pending" data-filter="pending">Bekleyen</button>
                        <button class="status-badge badge-gray status-pending" data-filter="completed">Biten</button>
                        <button class="status-badge badge-gray status-pending" data-filter="all">Tümü</button>
                    </div>
                    <div id="topicMasteryFilterDescription" class="filter-description-text text-muted mastery-filter-description"></div>
                </div>
            </div>
        </section>

        <section class="glass-card">
            <div class="card-body">
                <div class="mastery-table-container">
                    <table class="mastery-table">
                        <thead>
                            <tr>
                                <th>Konu</th>
                                <th>Başarı</th>
                                <th>Durum</th>
                                <th class="align-right">İşlemler</th>
                            </tr>
                        </thead>
                        <tbody id="topicMasteryList">
                            <tr><td colspan="4" class="text-center">Yükleniyor...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="mastery-cards" id="topicMasteryCards"></div>
            </div>
        </section>
    </div>

    <script type="module" src="../js/topic-mastery-page.js"></script>
</body>
</html>
