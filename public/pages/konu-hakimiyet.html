<!DOCTYPE html>
<html lang="tr">
<head>
<script id="early-theme-init">
(function(){
  try {
    var t = localStorage.getItem('theme');
    if (t !== 'light' && t !== 'dark') t = 'dark';
    document.documentElement.setAttribute('data-theme', t);
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konu Hakimiyet Merkezi | GOLD GYS</title>
    <link rel="stylesheet" href="../styles/tokens.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/app.css">
    <link rel="stylesheet" href="../css/analysis.css">
    <link rel="icon" type="image/png" href="/icons/favicon.png">
    <script src="/js/theme-init.js"></script>
    <style>
      .topic-mastery-page {
        display: grid;
        gap: 16px;
        margin-bottom: 24px;
        padding-bottom: max(90px, env(safe-area-inset-bottom));
      }
      .topic-mastery-page .glass-card {
        padding: 0;
      }
      .topic-mastery-page .card-body {
        padding: 18px;
      }
      .topic-mastery-page .analysis-header {
        padding: 22px 24px;
      }
      .topic-mastery-page .analysis-header .dashboard-page-title {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .topic-mastery-page .mastery-summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 18px;
        margin-bottom: 24px;
      }
      .topic-mastery-page .mastery-summary-grid .summary-pill {
        min-height: 112px;
      }
      .topic-mastery-page .summary-pill .label {
        color: var(--text-muted);
        font-size: 0.88rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        margin-bottom: 4px;
      }
      .topic-mastery-page .summary-pill .value {
        color: var(--text-main);
        font-weight: 800;
        font-size: 1.75rem;
        line-height: 1;
        margin: 0;
      }
      .topic-mastery-page .mastery-cards {
        display: none;
        gap: 12px;
      }
      .topic-mastery-page .mastery-card {
        border: 1px solid var(--border-subtle);
        border-radius: 14px;
        background: var(--bg-surface-elevated);
        padding: 14px;
      }
      .topic-mastery-page .mastery-card-title {
        color: var(--text-main);
        font-weight: 700;
        margin-bottom: 10px;
      }
      .topic-mastery-page .mastery-card-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 12px;
      }
      .topic-mastery-page .mastery-card-actions {
        display: flex;
        gap: 9px;
        justify-content: flex-end;
      }
      .topic-mastery-page .mastery-card-actions .glass-btn,
      .topic-mastery-page .action-buttons .glass-btn {
        width: 36px;
        height: 36px;
        border-radius: 11px;
        transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
      }
      .topic-mastery-page .mastery-card-actions .glass-btn:hover,
      .topic-mastery-page .action-buttons .glass-btn:hover {
        transform: translateY(-1px);
      }
      .topic-mastery-page .btn-complete {
        background: linear-gradient(135deg, rgba(34, 197, 94, 0.28), rgba(21, 128, 61, 0.22));
        border-color: rgba(74, 222, 128, 0.46);
        box-shadow: 0 8px 18px rgba(34, 197, 94, 0.22);
      }
      .topic-mastery-page .btn-focus {
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.3), rgba(30, 64, 175, 0.22));
        border-color: rgba(96, 165, 250, 0.48);
        box-shadow: 0 8px 18px rgba(59, 130, 246, 0.2);
      }
      .topic-mastery-page .btn-focus.is-focused {
        box-shadow: 0 0 0 1px rgba(147, 197, 253, 0.4), 0 10px 22px rgba(59, 130, 246, 0.28);
      }
      .topic-mastery-page .btn-reset {
        background: linear-gradient(135deg, rgba(239, 68, 68, 0.24), rgba(153, 27, 27, 0.2));
        border-color: rgba(248, 113, 113, 0.44);
        box-shadow: 0 8px 18px rgba(239, 68, 68, 0.22);
      }
      .topic-mastery-page .topic-controls input,
      .topic-mastery-page .topic-controls select {
        padding: 12px 18px;
        border-radius: 12px;
        border: 1px solid var(--border-subtle);
        background: var(--bg-body);
        color: var(--text-main);
        font-size: 0.95rem;
        transition: all 0.2s ease;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
      }
      .topic-mastery-page .topic-controls input:focus,
      .topic-mastery-page .topic-controls select:focus {
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        outline: none;
        background: var(--bg-surface);
      }
      .topic-mastery-page .chip-group .status-badge {
        min-height: 38px;
        padding: 8px 18px;
        border-radius: 20px;
        font-weight: 600;
        font-size: 0.85rem;
        transition: all 0.2s ease;
        border: 1px solid transparent;
        cursor: pointer;
      }
      .topic-mastery-page .chip-group .status-badge.badge-gray {
        background: var(--bg-body);
        color: var(--text-muted);
        border-color: var(--border-subtle);
      }
      .topic-mastery-page .chip-group .status-badge.badge-gray:hover {
        background: var(--bg-surface-elevated);
        color: var(--text-main);
        border-color: var(--border-color);
        transform: translateY(-1px);
      }
      .topic-mastery-page .summary-pill .stat-icon.stat-icon-success {
        color: var(--color-success);
        background: rgba(34, 197, 94, 0.15);
      }
      .topic-mastery-page .summary-pill .stat-icon.stat-icon-primary {
        color: var(--color-primary);
        background: rgba(59, 130, 246, 0.15);
      }
      .topic-mastery-page .summary-pill .stat-icon.stat-icon-muted {
        color: var(--text-muted);
        background: rgba(156, 163, 175, 0.15);
      }
      .topic-mastery-page .mastery-filter-panel {
        border: 1px solid var(--color-primary);
        box-shadow: 0 4px 20px rgba(59, 130, 246, 0.12);
        position: relative;
        overflow: hidden;
      }
      .topic-mastery-page .mastery-filter-panel-accent {
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
        background: var(--color-primary);
      }
      .topic-mastery-page .mastery-filter-panel-body {
        padding: 16px 20px;
      }
      .topic-mastery-page .mastery-filter-controls {
        margin: 0;
        padding: 0;
        background: transparent;
        border: none;
        align-items: flex-start;
      }
      .topic-mastery-page .mastery-filter-label {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
        font-size: 1.05rem;
        font-weight: 600;
        color: var(--color-primary);
      }
      .topic-mastery-page .mastery-filter-search {
        flex: 1 1 200px;
      }
      .topic-mastery-page .mastery-filter-sort {
        flex: 1 1 150px;
      }
      .topic-mastery-page .mastery-filter-chips {
        flex: 2 1 min-content;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .topic-mastery-page .mastery-filter-description {
        display: none;
        width: 100%;
        margin-top: 8px;
      }
      @media (max-width: 768px) {
        .topic-mastery-page {
          gap: 12px;
        }
        .topic-mastery-page .analysis-header {
          padding: 16px;
        }
        .topic-mastery-page .card-body {
          padding: 14px;
        }
        .topic-mastery-page .topic-controls {
          gap: 10px;
          padding: 10px;
        }
        .topic-mastery-page .topic-controls input,
        .topic-mastery-page .topic-controls select {
          min-width: 100%;
          flex-basis: 100%;
        }
        .topic-mastery-page .chip-group {
          flex: 1 1 100%;
        }
        .topic-mastery-page .mastery-summary-grid {
          grid-template-columns: 1fr;
          gap: 12px;
        }
        .topic-mastery-page .mastery-table-container {
          display: none;
        }
        .topic-mastery-page .mastery-cards {
          display: grid;
        }
      }
      @media (max-width: 420px) {
        .topic-mastery-page .analysis-header .dashboard-page-title {
          font-size: 1rem;
        }
        .topic-mastery-page .analysis-header .dashboard-page-subtitle {
          font-size: .8rem;
        }
      }
    </style>
</head>
<body>
    <div class="dashboard-container topic-mastery-page">
        <section class="analysis-header glass-card">
            <div>
                <h1 class="dashboard-page-title">
                    <span class="dashboard-page-title-icon" aria-hidden="true">&#128218;</span>
                    <span>Konu Hakimiyet Merkezi</span>
                </h1>
                <p class="dashboard-page-subtitle">Konu bazlı başarı durumunu takip et, odak konunu belirle ve çalışma ritmini düzenli ilerlet.</p>
            </div>
            <div class="header-actions">
                <div class="status-badge badge-blue" id="masteryLastUpdate"><span class="badge-dot pulse"></span>Güncelleniyor...</div>
                <button class="glass-btn btn-reset reset-stats-btn analysis-reset-btn" id="resetAllMasteryStatsBtn" type="button" title="Tüm analiz ve konu verilerini sıfırla">
                    <svg class="analysis-reset-btn-icon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                    </svg>
                    Tümünü Sıfırla
                </button>
            </div>
        </section>

        <div class="mastery-summary-grid">
            <div class="summary-pill stat-card">
                <div class="stat-icon stat-icon-success">
                    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <div class="stat-info">
                    <div class="label">Tamamlanan</div>
                    <div class="value" id="masteryCompleted">0</div>
                </div>
            </div>
            <div class="summary-pill stat-card">
                 <div class="stat-icon stat-icon-primary">
                    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                 </div>
                 <div class="stat-info">
                    <div class="label">Çalışılıyor</div>
                    <div class="value" id="masteryInProgress">0</div>
                 </div>
            </div>
            <div class="summary-pill stat-card">
                 <div class="stat-icon stat-icon-muted">
                    <svg width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg>
                 </div>
                 <div class="stat-info">
                    <div class="label">Başlanmadı</div>
                    <div class="value" id="masteryPending">0</div>
                 </div>
            </div>
        </div>

        <section class="glass-card mastery-filter-panel">
            <div class="mastery-filter-panel-accent"></div>
            <div class="card-body mastery-filter-panel-body">
                <div class="topic-controls mastery-filter-controls">
                    <div class="topic-controls-label mastery-filter-label">
                        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path></svg>
                        Filtre & Sıralama
                    </div>
                    <input type="search" id="topicMasterySearchInput" class="mastery-filter-search" placeholder="Konu ara...">
                    <select id="topicMasterySortSelect" class="mastery-filter-sort">
                        <option value="smart">Akıllı (Varsayılan)</option>
                        <option value="weakest">En Zayıf Başarı</option>
                        <option value="strongest">En Yüksek Başarı</option>
                        <option value="alphabetical">A-Z</option>
                    </select>
                    <div class="chip-group mastery-filter-chips" id="topicMasteryFilterChips">
                        <button class="status-badge badge-blue status-in-progress" data-filter="in_progress">Çalışılıyor</button>
                        <button class="status-badge badge-gray status-pending" data-filter="pending">Başlanmadı</button>
                        <button class="status-badge badge-gray status-pending" data-filter="completed">Tamamlanan</button>
                        <button class="status-badge badge-gray status-pending" data-filter="all">Tümü</button>
                    </div>
                    <div id="topicMasteryFilterDescription" class="filter-description-text text-muted mastery-filter-description"></div>
                </div>
            </div>
        </section>

        <section class="glass-card">
            <div class="card-body">
                <div class="mastery-table-container">
                    <table class="mastery-table">
                        <thead>
                            <tr>
                                <th>Konu</th>
                                <th>Başarı</th>
                                <th>Durum</th>
                                <th class="align-right">İşlemler</th>
                            </tr>
                        </thead>
                        <tbody id="topicMasteryList">
                            <tr><td colspan="4" class="text-center">Yükleniyor...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="mastery-cards" id="topicMasteryCards"></div>
            </div>
        </section>
    </div>

    <script type="module" src="../js/topic-mastery-page.js"></script>
</body>
</html>
